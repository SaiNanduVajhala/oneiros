<style>
        /* Custom Utility Classes for Techno-Organic Noir */
        .glass-panel {
            background-color: rgba(28, 27, 27, 0.4); /* surface-container-low */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(132, 148, 149, 0.1); /* outline */
        }
        
        .glow-primary {
            box-shadow: 0 0 15px rgba(0, 219, 231, 0.3); /* primary-fixed-dim */
        }
        
        .glow-secondary {
            box-shadow: 0 0 25px rgba(87, 27, 193, 0.4); /* secondary-container */
        }

        .text-glow-primary {
            text-shadow: 0 0 8px rgba(0, 219, 231, 0.6);
        }

        /* Ambient Background Animation */
        @keyframes pulse-nebula {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .nebula-violet {
            position: fixed;
            top: 20%;
            left: 30%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(87,27,193,0.15) 0%, rgba(19,19,19,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: pulse-nebula 8s ease-in-out infinite;
        }
        .nebula-cyan {
            position: fixed;
            bottom: 10%;
            right: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0,219,231,0.1) 0%, rgba(19,19,19,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: pulse-nebula 10s ease-in-out infinite reverse;
        }

        /* SVG Line Animations */
        .consolidation-ray {
            stroke-dasharray: 10;
            animation: flow 2s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen overflow-hidden selection:bg-primary-fixed-dim selection:text-on-primary">
<!-- Ambient Void Backgrounds -->
<div class="nebula-violet"></div>
<div class="nebula-cyan"></div>
<!-- 1. TopAppBar (Shared Component) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-desktop h-16 bg-background/80 backdrop-blur-xl border-b border-outline-variant/10">
<!-- Brand / Search (Left) -->
<div class="flex items-center gap-gutter">
<span class="font-headline-md text-headline-md text-primary-fixed-dim tracking-tighter">Oneiros</span>
<!-- Search bar 'on_right' logically means right of nav, but we keep it near brand or trailing depending on interpretation. Let's put it trailing as per standard desktop patterns. -->
</div>
<!-- Navigation Links (Center) -->
<nav class="hidden md:flex gap-8 absolute left-1/2 -translate-x-1/2">
<!-- Awake (Inactive) -->
<a class="text-on-surface-variant font-data-mono text-data-mono hover:text-primary transition-all duration-300" href="#" style="transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);">Awake</a>
<!-- Dreaming (Active) -->
<a class="text-primary-fixed-dim font-bold border-b-2 border-primary-fixed-dim pb-1 font-data-mono text-data-mono hover:text-primary transition-all duration-300 text-glow-primary" href="#" style="transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);">Dreaming</a>
</nav>
<!-- Trailing Actions (Right) -->
<div class="flex items-center gap-6">
<div class="hidden lg:flex items-center gap-2 px-3 py-1 rounded-full border border-outline-variant/30 bg-surface-container-low/50">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">search</span>
<input class="bg-transparent border-none text-data-mono font-data-mono text-on-surface focus:ring-0 w-48 p-0 placeholder:text-outline/50" placeholder="Search cognitive topology..." type="text"/>
</div>
<button class="font-label-caps text-label-caps text-primary-fixed-dim border border-primary-fixed-dim/50 px-4 py-2 rounded glass-panel hover:glow-primary transition-all duration-300">
                Dream/Wake Control
            </button>
<div class="flex gap-4 text-on-surface-variant">
<span class="material-symbols-outlined hover:text-primary transition-colors cursor-pointer" data-icon="settings">settings</span>
</div></div></header></body></html>
